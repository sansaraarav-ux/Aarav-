<!DOCTYPE html>
<html>
<head>
    <title>Rowspan and Colspan Example</title>
</head>
<head>
 <title>About Us</title>
 <style>
   body{ 
    background-color: #746868;
 }
p{ 
    font-size: 18px;
    color: #333;
}
 </style>
</head> 
<body>

<table border="1" cellpadding="10">
    <tr>
        <th rowspan="2">Name</th>
        <th colspan="2">Marks</th>
    </tr>
    <tr>
        <th>Math</th>
        <th>Science</th>
    </tr>
    <tr>
        <td>Aarav</td>
        <td>90</td>
        <td>85</td>
    </tr>
    <tr>
        <td>John</td>
        <td>88</td>
        <td>92</td>
    </tr>
</table>

</body>
</html>
