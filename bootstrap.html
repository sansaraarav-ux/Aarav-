<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyTrail - Travel & Booking</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons (for the star rating) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        /* Only the bits Bootstrap utilities don't cover: brand color + hero background */
        :root {
            --bs-primary: #2563eb;
            --bs-primary-rgb: 37, 99, 235;
            --secondary: #f59e0b;
        }
        .btn-primary { background-color: var(--bs-primary); border-color: var(--bs-primary); }
        .btn-primary:hover { background-color: #1d4ed8; border-color: #1d4ed8; }
        .btn-secondary { background-color: var(--secondary); border-color: var(--secondary); }
        .btn-secondary:hover { background-color: #d97706; border-color: #d97706; }
        .text-primary-custom { color: var(--bs-primary) !important; }
        .text-secondary-custom { color: var(--secondary) !important; }

        .hero {
            min-height: 70vh;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
                        url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?ixlib=rb-4.0.3&auto=format&fit=crop&w=2021&q=80') center/cover;
        }

        .card-img-top { height: 200px; object-fit: cover; }
        .card:hover { transform: translateY(-5px); transition: transform 0.3s; }

        .navbar-brand { color: var(--bs-primary) !important; font-weight: bold; }
        .nav-link:hover { color: var(--bs-primary) !important; }
        footer a:hover { color: var(--bs-primary) !important; }
        footer h5 { color: var(--secondary); }
    </style>
