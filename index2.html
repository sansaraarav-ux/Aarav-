<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile Page</title>
<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: #eef1f5;
  }

  /* Header */
  .header {
    background: #1e8e3e;
    color: #ffffff;
    text-align: center;
    padding: 32px 24px;
  }

  .header h1 {
    margin: 0;
    font-size: 28px;
    font-weight: 700;
  }

  /* Main content area */
  .main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  /* Profile card */
  .card {
    width: 300px;
    height: 380px; /* fixed height so overflow shows inside, not below the card */
    background: #ffffff;
    border-radius: 12px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    padding: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .avatar-wrap {
    position: relative;
    width: 100px;
    height: 100px;
    margin-bottom: 16px;
  }

  .avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: #dfe3ea;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #9aa1ac;
    font-size: 13px;
  }

  .status-dot {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 16px;
    height: 16px;
    background: #2ecc71;
    border: 2px solid #ffffff;
    border-radius: 50%;
  }

  .name {
    margin: 0 0 4px;
    font-size: 20px;
    font-weight: 700;
    color: #1a2233;
  }

  .role {
    margin: 0 0 16px;
    font-size: 14px;
    color: #6b7280;
  }

  .bio {
    flex: 1;
    width: 100%;
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.6;
    color: #374151;
    padding-right: 6px;
  }

  /* thin scrollbar so it reads clearly as "inside the box" */
  .bio::-webkit-scrollbar {
    width: 6px;
  }
  .bio::-webkit-scrollbar-thumb {
    background: #c7cdd6;
    border-radius: 3px;
  }

  /* Footer */
  .footer {
    background: #5b2333;
    color: #ffffff;
    text-align: center;
    padding: 24px;
    font-size: 15px;
  }
</style>
</head>
<body>

  <header class="header">
    <h1>PROFILE</h1>
  </header>

  <main class="main">
    <div class="card">
      <div class="avatar-wrap">
        <div class="avatar">100 &times; 100</div>
        <span class="status-dot"></span>
      </div>
      <h2 class="name">Jane Doe</h2>
      <p class="role">Frontend Developer</p>
      <div class="bio">
        
      </div>
    </div>
  </main>

  <footer class="footer">
    Card
  </footer>

</body>
</html>
