<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery</title>
<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    background: #ffffff;
  }

  .container {
    flex: 1;
    padding: 32px 48px;
  }

  h1 {
    margin: 0 0 24px;
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .gallery-item {
    background: #1565f0;
    color: #ffffff;
    height: 100px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 500;
  }

  .footer {
    text-align: center;
    padding: 16px;
    font-size: 13px;
    color: #6b6b6b;
    background: #f2f2f2;
  }
</style>
</head>
<body>

  <div class="container">
    <h1>Gallery</h1>
    <div class="gallery">
      <div class="gallery-item">1</div>
      <div class="gallery-item">2</div>
      <div class="gallery-item">3</div>
      <div class="gallery-item">4</div>
      <div class="gallery-item">5</div>
      <div class="gallery-item">6</div>
    </div>
  </div>

  <footer class="footer">
    Made for the CSS class — Flexbox &amp; Grid practice
  </footer>

</body>
</html>
